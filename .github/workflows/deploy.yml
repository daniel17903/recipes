name: Rezepte validieren & Website deployen

on:
  push:
    branches: [main]
  workflow_dispatch:

# Nur ein Deployment gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rezepte gegen Schema prüfen
        run: python scripts/validate.py

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Website bauen
        run: python scripts/build.py
      - name: Pages konfigurieren
        uses: actions/configure-pages@v5
      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
